name: CD / Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # create GitHub Release
  packages: write   # push to GHCR

env:
  REGISTRY: ghcr.io

jobs:
  images:
    name: Docker — ${{ matrix.bin }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - bin: crow-api
            dockerfile: docker/Dockerfile.api
          - bin: crow-operator
            dockerfile: docker/Dockerfile.operator
          - bin: crow-vps-agent
            dockerfile: docker/Dockerfile.vps-agent
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.bin }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.bin }}
          cache-to: type=gha,scope=${{ matrix.bin }},mode=max

  cli:
    name: CLI — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-14
            target: x86_64-apple-darwin
            cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            cross: false
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --bin crow --target ${{ matrix.target }}
          else
            cargo build --release --bin crow --target ${{ matrix.target }}
          fi

      - name: Archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ github.workspace }}/crow-${{ matrix.target }}.tar.gz crow

      - uses: actions/upload-artifact@v4
        with:
          name: crow-${{ matrix.target }}
          path: crow-${{ matrix.target }}.tar.gz

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and push
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # GHCR OCI requires a lowercase namespace
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm package charts/crowcloud --version "$VERSION" --app-version "$VERSION"
          helm push "crowcloud-${VERSION}.tgz" "oci://ghcr.io/${OWNER}/charts"

  release:
    name: GitHub Release
    needs: [cli, images, helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: crow-*
          merge-multiple: true
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
