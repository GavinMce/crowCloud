name: Bug Report
description: Something isn't working correctly
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out every required field — incomplete reports are hard to act on and will be closed.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of crowCloud is affected?
      options:
        - API (crow-api)
        - Operator (crow-operator)
        - CLI (crow)
        - Frontend
        - Proxmox Provider (crow-provider-proxmox)
        - Hetzner Provider (crow-provider-hetzner)
        - VPS Agent (crow-vps-agent)
        - Auth (crow-auth)
        - Database (crow-db)
        - Networking / Tunnel
        - Helm chart
        - CI / Build
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `crow --version`, the release tag, or a Git commit SHA.
      placeholder: "0.1.0 / v0.1.0 / abc1234"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably reproduce the issue.
      placeholder: |
        1. Run `crow vm create ...`
        2. Observe operator logs: `kubectl logs -n crowcloud ...`
        3. See error: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: API logs, operator logs, CLI output, or browser console errors. Redact any credentials.
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Kubernetes version, Proxmox version, OS, etc. — anything that may be relevant.
      placeholder: |
        - Kubernetes: 1.32.0
        - Proxmox VE: 8.3
        - crowCloud deployed via: Helm / kubectl apply / local dev
        - OS: Ubuntu 24.04
    validations:
      required: false
