name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please search existing issues and PRs to avoid duplicates.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of crowCloud would this affect?
      options:
        - API (crow-api)
        - Operator (crow-operator)
        - CLI (crow)
        - Frontend
        - New Resource Type
        - New Provider
        - Networking / Tunnel
        - Auth
        - Helm chart / Deployment
        - CI / Tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem this would solve
      description: Describe the gap or pain point clearly. Concrete examples help.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? How should it work from a user perspective?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've tried to solve this, or approaches you considered and rejected.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, screenshots, prior art, or anything else that helps.
    validations:
      required: false
