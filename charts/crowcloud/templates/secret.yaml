apiVersion: v1
kind: Secret
metadata:
  name: {{ include "crowcloud.fullname" . }}-secrets
  labels:
    {{- include "crowcloud.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ required "api.env.JWT_SECRET is required (e.g. --set api.env.JWT_SECRET=$(openssl rand -hex 32))" .Values.api.env.JWT_SECRET | quote }}
  {{- if and (not .Values.postgres.enabled) .Values.api.env.DATABASE_URL }}
  database-url: {{ .Values.api.env.DATABASE_URL | quote }}
  {{- end }}
