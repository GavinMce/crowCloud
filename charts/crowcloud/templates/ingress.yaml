{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "crowcloud.fullname" . }}
  labels:
    {{- include "crowcloud.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.ingressClassName }}
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ required "ingress.host is required when ingress.enabled is true" .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName | default (printf "%s-tls" (include "crowcloud.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ required "ingress.host is required when ingress.enabled is true" .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "crowcloud.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "crowcloud.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
