apiVersion: v1
kind: Service
metadata:
  name: {{ include "crowcloud.fullname" . }}-frontend
  labels:
    {{- include "crowcloud.componentSelectorLabels" (merge (dict "component" "frontend") .) | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type | default "ClusterIP" }}
  selector:
    {{- include "crowcloud.componentSelectorLabels" (merge (dict "component" "frontend") .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.port }}
      targetPort: http
      {{- if and (eq .Values.frontend.service.type "NodePort") .Values.frontend.service.nodePort }}
      nodePort: {{ .Values.frontend.service.nodePort }}
      {{- end }}
