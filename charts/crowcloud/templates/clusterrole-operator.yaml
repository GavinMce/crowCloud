apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "crowcloud.fullname" . }}-operator
  labels:
    {{- include "crowcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
rules:
  # Self-installs the VirtualMachine CRD at startup via server-side apply
  # (crates/crow-operator/src/main.rs::install_crds).
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "create", "patch"]
  # Self-creates the fixed crow-resources namespace at startup
  # (crates/crow-operator/src/main.rs::ensure_namespace).
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create"]
  # Full reconcile loop: watches, provisions/reconciles/deprovisions, and
  # patches status on VirtualMachine CRs
  # (crates/crow-operator/src/controllers/virtual_machine.rs).
  - apiGroups: ["crow.cloud"]
    resources: ["virtualmachines"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["crow.cloud"]
    resources: ["virtualmachines/status"]
    verbs: ["get", "update", "patch"]
