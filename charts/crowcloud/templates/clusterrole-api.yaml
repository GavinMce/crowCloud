apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "crowcloud.fullname" . }}-api
  labels:
    {{- include "crowcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
rules:
  # crow-api only ever creates the VirtualMachine CR at resource-create time
  # and deletes it at resource-delete time (crates/crow-api/src/routes/resources.rs)
  # — it never reads CR state back (Postgres is the read path), so no
  # get/list/watch is needed here.
  - apiGroups: ["crow.cloud"]
    resources: ["virtualmachines"]
    verbs: ["create", "delete"]
  - apiGroups: ["crow.cloud"]
    resources: ["k8sclusters"]
    verbs: ["create", "delete"]
